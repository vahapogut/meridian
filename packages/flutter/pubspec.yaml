    sdk: flutter
  web_socket_channel: ^2.4.0
  sqflite: ^2.3.0
  path: ^1.8.0
  uuid: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
