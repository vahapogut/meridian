version: 0.5.0
homepage: https://github.com/vahapogut/MeridianDB
repository: https://github.com/vahapogut/MeridianDB
license: Apache-2.0

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
