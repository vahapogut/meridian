[package]
name = "meridian-core"
version = "0.5.0"
edition = "2021"
description = "Rust WASM core for Meridian sync engine — HLC + LWW CRDT primitives"
license = "Apache-2.0"
repository = "https://github.com/vahapogut/meridian"
authors = ["Abdulvahap OGUT <info@ipeclabs.com>"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = "s"
lto = true
